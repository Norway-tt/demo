<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Hager Papprint Demo</title>

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0b7a3d" />

  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="app-header" id="appHeader">
      <div class="header-spacer"></div>

      <div class="header-logo-wrap">
        <img src="logo.png" class="logo" alt="Hager Papprint Logo" />
      </div>

      <button
        id="menuButton"
        class="menu-button"
        type="button"
        aria-label="Menü öffnen"
        onclick="toggleMenu()"
      >
        <span></span>
        <span></span>
        <span></span>
      </button>
    </header>

    <main class="app-main">
      <!-- SPLASH -->
      <section id="screen-splash" class="screen active splash-screen">
        <div class="screen-bg">
          <img src="element.png" class="corner-visual splash-corner" alt="" />
        </div>

        <div class="screen-content splash-content">
          <img src="logo.png" class="splash-logo" alt="Hager Papprint Logo" />
        </div>
      </section>

      <!-- FULLSCREEN MENU -->
      <div id="menuOverlay" class="menu-overlay" onclick="closeMenu()">
        <div class="menu-fullscreen" onclick="event.stopPropagation()">
          <div class="menu-fullscreen-header">
            <div>Menü</div>
            <button class="menu-close" type="button" onclick="closeMenu()">✕</button>
          </div>

          <button class="menu-item" type="button" onclick="switchProcess('wareneingang')">
            Wareneingang
          </button>

          <button class="menu-item" type="button" onclick="switchProcess('umbuchung')">
            Umbuchung
          </button>

          <button class="menu-item disabled" type="button" disabled>
            Warenausgang
          </button>
        </div>
      </div>

      <!-- WARENEINGANG -->
      <section id="screen-wareneingang" class="screen">
        <div class="screen-bg">
          <img src="element.png" class="corner-visual" alt="" />
        </div>

        <div class="screen-content">
          <h1>Wareneingang</h1>

          <div class="top-meta">
            <div class="status" id="statusIncoming">Bitte Customer Code scannen</div>
          </div>

          <div class="form-area">
            <div class="field-group">
              <label for="docBarcode">Customer Code</label>
              <div class="field-wrap">
                <input
                  id="docBarcode"
                  class="required-field"
                  placeholder="Barcode scannen"
                  autocomplete="off"
                  onchange="handleDocumentScan(this.value)"
                />
                <button
                  class="field-action"
                  type="button"
                  aria-label="Dokument Barcode zurücksetzen"
                  onclick="resetIncomingField('docBarcode')"
                >
                  ↻
                </button>
              </div>
            </div>

            <div class="field-group">
              <label for="pidBarcode">PID Code</label>
              <div class="field-wrap">
                <input
                  id="pidBarcode"
                  class="required-field"
                  placeholder="PID scannen"
                  autocomplete="off"
                  onchange="handlePidScan(this.value)"
                />
                <button
                  class="field-action"
                  type="button"
                  aria-label="PID Code zurücksetzen"
                  onclick="resetIncomingField('pidBarcode')"
                >
                  ↻
                </button>
              </div>
            </div>

            <div class="field-group">
              <label for="incomingLocation">Stellplatz</label>
              <div class="field-wrap">
                <input
                  id="incomingLocation"
                  class="required-field"
                  placeholder="Stellplatz scannen"
                  autocomplete="off"
                />
                <button
                  class="field-action"
                  type="button"
                  aria-label="Stellplatz zurücksetzen"
                  onclick="resetIncomingField('incomingLocation')"
                >
                  ↻
                </button>
              </div>
            </div>

            <div class="field-group">
              <label>Produkt Informationen</label>
              <div class="product-card">
                <div class="field-group product-supplier">
                  <div class="mini-label">Hersteller</div>
                  <div class="field-wrap">
                    <input id="supplierField" readonly />
                  </div>
                </div>

                <div class="product-grid">
                  <div class="mini-field">
                    <div class="mini-label">Sheets</div>
                    <div class="field-wrap field-wrap-mini">
                      <input id="sheets" class="editable-field" />
                      <button
                        id="action-sheets"
                        class="field-action"
                        type="button"
                        aria-label="Sheets bearbeiten"
                        onclick="toggleEditAction('sheets')"
                      >
                        ✎
                      </button>
                    </div>
                  </div>

                  <div class="mini-field">
                    <div class="mini-label">Länge</div>
                    <div class="field-wrap field-wrap-mini">
                      <input id="laenge" class="editable-field" />
                      <button
                        id="action-laenge"
                        class="field-action"
                        type="button"
                        aria-label="Länge bearbeiten"
                        onclick="toggleEditAction('laenge')"
                      >
                        ✎
                      </button>
                    </div>
                  </div>

                  <div class="mini-field">
                    <div class="mini-label">Breite</div>
                    <div class="field-wrap field-wrap-mini">
                      <input id="breite" class="editable-field" />
                      <button
                        id="action-breite"
                        class="field-action"
                        type="button"
                        aria-label="Breite bearbeiten"
                        onclick="toggleEditAction('breite')"
                      >
                        ✎
                      </button>
                    </div>
                  </div>

                  <div class="mini-field">
                    <div class="mini-label">Netto Gewicht</div>
                    <div class="field-wrap field-wrap-mini">
                      <input id="nettoGewicht" class="editable-field" />
                      <button
                        id="action-nettoGewicht"
                        class="field-action"
                        type="button"
                        aria-label="Netto Gewicht bearbeiten"
                        onclick="toggleEditAction('nettoGewicht')"
                      >
                        ✎
                      </button>
                    </div>
                  </div>

                  <div class="mini-field">
                    <div class="mini-label">Brutto Gewicht</div>
                    <div class="field-wrap field-wrap-mini">
                      <input id="bruttoGewicht" class="editable-field" />
                      <button
                        id="action-bruttoGewicht"
                        class="field-action"
                        type="button"
                        aria-label="Brutto Gewicht bearbeiten"
                        onclick="toggleEditAction('bruttoGewicht')"
                      >
                        ✎
                      </button>
                    </div>
                  </div>

                  <div class="mini-field">
                    <div class="mini-label">Paletten Nummer</div>
                    <div class="field-wrap field-wrap-mini">
                      <input id="palettenNummer" class="editable-field" />
                      <button
                        id="action-palettenNummer"
                        class="field-action"
                        type="button"
                        aria-label="Paletten Nummer bearbeiten"
                        onclick="toggleEditAction('palettenNummer')"
                      >
                        ✎
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <div class="footer footer-inline">
              <button class="primary" type="button" onclick="resetIncomingForm()">Reset</button>
              <button class="primary" type="button" onclick="bookIncoming()">Buchen</button>
            </div>

            <div class="connection-status">
              <span class="connection-text" id="connectionText">Verbunden</span>
              <span class="connection-dot online" id="connectionDot"></span>
            </div>
          </div>
        </div>
      </section>

      <!-- UMBUCHUNG -->
      <section id="screen-umbuchung" class="screen">
        <div class="screen-bg">
          <img src="element.png" class="corner-visual" alt="" />
        </div>

        <div class="screen-content">
          <h1>Umbuchung</h1>

          <div class="top-meta">
            <div class="status" id="statusTransfer">Bitte PID scannen</div>
          </div>

          <div class="form-area">
            <div class="field-group">
              <label for="transferPidBarcode">PID Code</label>
              <div class="field-wrap">
                <input
                  id="transferPidBarcode"
                  class="required-field"
                  placeholder="PID scannen"
                  autocomplete="off"
                  onchange="handleTransferPidScan(this.value)"
                />
                <button
                  class="field-action"
                  type="button"
                  aria-label="PID Code zurücksetzen"
                  onclick="resetTransferField('transferPidBarcode')"
                >
                  ↻
                </button>
              </div>
            </div>

            <div class="field-group">
              <label for="currentLocation">Aktueller Stellplatz</label>
              <div class="field-wrap">
                <input id="currentLocation" readonly />
              </div>
            </div>

            <div class="field-group">
              <label for="newLocation">Neuer Stellplatz</label>
              <div class="field-wrap">
                <input
                  id="newLocation"
                  class="required-field"
                  placeholder="Neuen Stellplatz scannen"
                  autocomplete="off"
                />
                <button
                  class="field-action"
                  type="button"
                  aria-label="Neuen Stellplatz zurücksetzen"
                  onclick="resetTransferField('newLocation')"
                >
                  ↻
                </button>
              </div>
            </div>

            <div class="footer footer-inline">
              <button class="primary" type="button" onclick="resetTransferForm()">Reset</button>
              <button class="primary" type="button" onclick="bookTransfer()">Buchen</button>
            </div>

            <div class="connection-status">
              <span class="connection-text" id="connectionTextTransfer">Verbunden</span>
              <span class="connection-dot online" id="connectionDotTransfer"></span>
            </div>
          </div>
        </div>
      </section>

      <!-- SUCCESS -->
      <section id="screen-success" class="screen success-screen" onclick="closeSuccessScreen()">
        <div class="screen-bg">
          <img src="element.png" class="corner-visual success-corner" alt="" />
        </div>

        <div class="screen-content success-content">
          <div class="success-circle">
            <span class="success-check">✓</span>
          </div>
          <div class="success-text" id="successText">Buchung erfolgreich</div>
        </div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
